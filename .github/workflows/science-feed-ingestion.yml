name: Science Feed Daily Ingestion

# Caching / refresh strategy (ticket ie7g9l AC #4):
# Each of the four science feed cache tables (cloudspotting_mars_daily,
# active_asteroids_daily, rubin_comet_catchers_daily, gaia_variables_daily)
# is meant to hold one row per game_date per feed. Each ingestion script
# pulls a batch of subjects from Zooniverse Panoptes and fans them out over
# `--days` future calendar days via `cycleDailyRows()`, then upserts on
# (game_date, subject_id) — or (game_date, source_id) for gaia — so re-running
# the same day never creates a duplicate row (see AC #2, already implemented
# in scripts/lib/science-feed-runtime.mjs::upsertRows). "Fresh" for these
# tables means: a row exists for today's game_date; the daily cron below is
# what keeps that true without a human running the script by hand.
#
# scripts/lib/science-feed-runtime.mjs writes directly to the Saily PocketBase
# cache tables using a superuser token. The shared auth PocketBase is not used
# by this feed cache job.
#
# Panoptes auth: client_credentials tokens expire in ~2h (verified against
# the live endpoint), so a static ZOONIVERSE_BEARER_TOKEN secret would work
# once and then silently 401 on every scheduled run after the first.
# scripts/lib/zooniverse-panoptes.mjs can exchange ZOONIVERSE_CLIENT_ID/
# ZOONIVERSE_CLIENT_SECRET for a fresh token itself, but its in-memory cache
# only lives for one `node` process — since this job runs 5 separate ingest
# scripts as 5 separate steps/processes, that would mean 5 redundant OAuth
# round-trips per run. Instead, the "Get Zooniverse token" step below
# exchanges it once and writes the result to $GITHUB_ENV as
# ZOONIVERSE_BEARER_TOKEN, which every later step inherits automatically —
# each ingest script's existing ZOONIVERSE_BEARER_TOKEN fallback path picks
# it up with zero code changes needed there.

on:
  schedule:
    # 14:00 UTC = 00:00 AEST / 01:00 AEDT next day — lands as a fresh feed
    # first thing in the Melbourne morning (AEST is UTC+10, AEDT is UTC+11).
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ingest:
    name: Run science feed ingestion scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get Zooniverse token
        env:
          ZOONIVERSE_CLIENT_ID: ${{ secrets.ZOONIVERSE_CLIENT_ID }}
          ZOONIVERSE_CLIENT_SECRET: ${{ secrets.ZOONIVERSE_CLIENT_SECRET }}
          ZOONIVERSE_BEARER_TOKEN: ${{ secrets.ZOONIVERSE_BEARER_TOKEN }}
        run: |
          if [ -n "$ZOONIVERSE_CLIENT_ID" ] && [ -n "$ZOONIVERSE_CLIENT_SECRET" ]; then
            TOKEN=$(node -e '
              const body = JSON.stringify({ grant_type: "client_credentials", client_id: process.env.ZOONIVERSE_CLIENT_ID, client_secret: process.env.ZOONIVERSE_CLIENT_SECRET, scope: "public" });
              fetch("https://panoptes.zooniverse.org/oauth/token", { method: "POST", headers: { "Content-Type": "application/json", Accept: "application/vnd.api+json; version=1" }, body })
                .then((res) => { if (!res.ok) throw new Error(`token exchange failed with ${res.status}`); return res.json(); })
                .then((payload) => { if (!payload.access_token) throw new Error("no access_token in response"); process.stdout.write(payload.access_token); })
                .catch((err) => { console.error(err); process.exit(1); });
            ')
            echo "::add-mask::$TOKEN"
            echo "ZOONIVERSE_BEARER_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          elif [ -n "$ZOONIVERSE_BEARER_TOKEN" ]; then
            echo "::add-mask::$ZOONIVERSE_BEARER_TOKEN"
            echo "ZOONIVERSE_BEARER_TOKEN=$ZOONIVERSE_BEARER_TOKEN" >> "$GITHUB_ENV"
          else
            echo "::error::Neither ZOONIVERSE_CLIENT_ID/SECRET nor ZOONIVERSE_BEARER_TOKEN are configured."
            exit 1
          fi

      # Sprint 2 priority per megadoc-2026-05-14 Section 7 H6 audit — run first
      # so at least this feed satisfies AC #1 even if the others are blocked.
      - name: Ingest Cloudspotting on Mars
        env:
          SAILY_PB_URL: ${{ secrets.SAILY_PB_URL }}
          SAILY_PB_SUPERUSER_EMAIL: ${{ secrets.SAILY_PB_SUPERUSER_EMAIL }}
          SAILY_PB_SUPERUSER_PASSWORD: ${{ secrets.SAILY_PB_SUPERUSER_PASSWORD }}
        run: node scripts/ingest-cloudspotting-mars.mjs

      - name: Ingest Active Asteroids
        env:
          SAILY_PB_URL: ${{ secrets.SAILY_PB_URL }}
          SAILY_PB_SUPERUSER_EMAIL: ${{ secrets.SAILY_PB_SUPERUSER_EMAIL }}
          SAILY_PB_SUPERUSER_PASSWORD: ${{ secrets.SAILY_PB_SUPERUSER_PASSWORD }}
        run: node scripts/ingest-active-asteroids.mjs

      # Backs the daily transit-spotter minigame (STS-303), which replaced
      # the old internal `planet` mission in MISSION_GAMES.
      - name: Ingest Planet Hunters TESS
        env:
          SAILY_PB_URL: ${{ secrets.SAILY_PB_URL }}
          SAILY_PB_SUPERUSER_EMAIL: ${{ secrets.SAILY_PB_SUPERUSER_EMAIL }}
          SAILY_PB_SUPERUSER_PASSWORD: ${{ secrets.SAILY_PB_SUPERUSER_PASSWORD }}
        run: node scripts/ingest-planet-hunters-tess.mjs

      - name: Ingest Rubin Comet Catchers
        env:
          SAILY_PB_URL: ${{ secrets.SAILY_PB_URL }}
          SAILY_PB_SUPERUSER_EMAIL: ${{ secrets.SAILY_PB_SUPERUSER_EMAIL }}
          SAILY_PB_SUPERUSER_PASSWORD: ${{ secrets.SAILY_PB_SUPERUSER_PASSWORD }}
        run: node scripts/ingest-rubin-comet-catchers.mjs

      - name: Ingest Gaia Variables
        env:
          SAILY_PB_URL: ${{ secrets.SAILY_PB_URL }}
          SAILY_PB_SUPERUSER_EMAIL: ${{ secrets.SAILY_PB_SUPERUSER_EMAIL }}
          SAILY_PB_SUPERUSER_PASSWORD: ${{ secrets.SAILY_PB_SUPERUSER_PASSWORD }}
        run: node scripts/ingest-gaia-variables.mjs

      # Close Approach Ranker (STS sprint-2026-07-25): unlike the four feeds
      # above (Zooniverse Panoptes subjects, fanned out via cycleDailyRows()
      # in scripts/lib/science-feed-runtime.mjs), this pulls real NASA/JPL
      # close-approach data directly — no Zooniverse token needed. The script
      # lives under web/scripts (not scripts/) and takes explicit
      # --date-min/--date-max/--game-date args rather than computing its own
      # date range, so this step computes "today" (and a lookahead window) in
      # Melbourne time itself. No web/ npm install needed — the script only
      # imports Node built-ins and its own sibling normalizer module.
      - name: Ingest Close Approach Ranker
        working-directory: web
        env:
          SAILY_PB_URL: ${{ secrets.SAILY_PB_URL }}
          SAILY_PB_SUPERUSER_EMAIL: ${{ secrets.SAILY_PB_SUPERUSER_EMAIL }}
          SAILY_PB_SUPERUSER_PASSWORD: ${{ secrets.SAILY_PB_SUPERUSER_PASSWORD }}
        run: |
          GAME_DATE=$(TZ=Australia/Melbourne date +%Y-%m-%d)
          DATE_MAX=$(TZ=Australia/Melbourne date -d "+7 days" +%Y-%m-%d)
          node scripts/ingest-close-approaches.mjs --date-min "$GAME_DATE" --date-max "$DATE_MAX" --game-date "$GAME_DATE" --write

      # Repo secrets that must actually be configured for this workflow to do
      # anything (none of these can be verified or created from this change):
      #   - ZOONIVERSE_CLIENT_ID      (Panoptes OAuth app id; preferred auth path)
      #   - ZOONIVERSE_CLIENT_SECRET  (Panoptes OAuth app secret)
      #   - ZOONIVERSE_BEARER_TOKEN   (fallback only — expires ~2h, not safe as a lone secret)
      #   - SAILY_PB_URL
      #   - SAILY_PB_SUPERUSER_EMAIL
      #   - SAILY_PB_SUPERUSER_PASSWORD
      #
      # AC #3 (failure notification): this repo has no existing Slack/webhook
      # notification pattern to match (checked .github/workflows/*.yml). v1
      # relies on GitHub's built-in Actions failure notification (email /
      # Actions tab / repo watch settings) triggered automatically by any
      # step above failing — no fake integration invented. If/when a real
      # webhook target exists, add a step here such as:
      #
      # - name: Notify on failure
      #   if: failure()
      #   run: |
      #     curl -sf -X POST -H 'Content-type: application/json' \
      #       --data '{"text":"Science feed ingestion failed: ${{ github.workflow }} run ${{ github.run_id }}"}' \
      #       "${{ secrets.SLACK_WEBHOOK_URL }}"
