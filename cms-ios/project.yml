name: SailyCMS
options:
  bundleIdPrefix: tech.skinetics.saily
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SailyCMS-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/SailyCMS
    info:
      path: Sources/SailyCMS/App/Info-iOS.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Saily CMS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.skinetics.saily.cms.ios
        PRODUCT_NAME: SailyCMS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

  SailyCMS-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/SailyCMS
    info:
      path: Sources/SailyCMS/App/Info-macOS.plist
      properties:
        CFBundleDisplayName: Saily CMS
        NSHumanReadableCopyright: "Skinetics"
        LSApplicationCategoryType: public.app-category.productivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.skinetics.saily.cms.macos
        PRODUCT_NAME: SailyCMS
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
