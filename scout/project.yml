name: Scout
options:
  bundleIdPrefix: tech.skinetics
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Scout:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Scout
    info:
      path: Sources/Scout/App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Scout
        UIUserInterfaceStyle: Automatic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.skinetics.scout
        PRODUCT_NAME: Scout
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
