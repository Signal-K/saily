<svg width="80" height="60" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="0" y="0" width="80" height="60" filterUnits="userSpaceOnUse">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#43302b" flood-opacity="0.1" />
    </filter>
  </defs>
  
  <!-- Card body -->
  <rect x="4" y="4" width="72" height="52" rx="4" fill="#fff9f2" stroke="#e5d5c5" stroke-width="1" filter="url(#shadow)" />
  
  <!-- Stamp area -->
  <rect x="58" y="10" width="12" height="14" rx="1" fill="#bd6b56" fill-opacity="0.1" stroke="#bd6b56" stroke-width="0.5" stroke-dasharray="2 1" />
  <path d="M64 13 L65.5 16 H68.5 L66 18 L67 21 L64 19.5 L61 21 L62 18 L59.5 16 H62.5 L64 13 Z" fill="#bd6b56" />
  
  <!-- Address lines -->
  <line x1="44" y1="32" x2="70" y2="32" stroke="#43302b" stroke-opacity="0.2" stroke-width="1" />
  <line x1="44" y1="40" x2="70" y2="40" stroke="#43302b" stroke-opacity="0.2" stroke-width="1" />
  <line x1="44" y1="48" x2="60" y2="48" stroke="#43302b" stroke-opacity="0.2" stroke-width="1" />
  
  <!-- Divider line -->
  <line x1="40" y1="12" x2="40" y2="48" stroke="#43302b" stroke-opacity="0.1" stroke-width="1" />
  
  <!-- Message scribbles -->
  <path d="M10 16 H30 M10 22 H28 M10 28 H32 M10 34 H25" stroke="#43302b" stroke-opacity="0.15" stroke-width="1" stroke-linecap="round" />
  
  <!-- Heart icon -->
  <path d="M12 48 C12 46 14 45 15 46.5 C16 45 18 46 18 48 C18 50 15 52 15 52 C15 52 12 50 12 48 Z" fill="#e06b8b" fill-opacity="0.6" />
