services:
  web:
    build:
      context: .
      target: dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SHARED_PB_URL: ${NEXT_PUBLIC_SHARED_PB_URL:-http://127.0.0.1:8090}
      NEXT_PUBLIC_SAILY_PB_URL: ${NEXT_PUBLIC_SAILY_PB_URL:-http://127.0.0.1:8092}

  cms:
    build:
      context: .
      target: dev
    command: npm run cms:validate
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      NEXT_TELEMETRY_DISABLED: "1"

volumes:
  web_node_modules:
