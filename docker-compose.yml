services:
  pocketbase:
    build:
      context: ./backend
    ports:
      - "8092:8092"
    volumes:
      - ./backend/pb_data:/pb/pb_data
    environment:
      SHARED_PB_URL: ${SHARED_PB_URL:-http://host.docker.internal:8090}
      SAILY_PB_ENCRYPTION_KEY: ${SAILY_PB_ENCRYPTION_KEY:-}
      CMS_EDITOR_EMAILS: ${CMS_EDITOR_EMAILS:-}
      CMS_EDITOR_USER_IDS: ${CMS_EDITOR_USER_IDS:-}
      SAILY_WEB_URL: ${SAILY_WEB_URL:-http://web:3000}
      PUSH_NOTIFY_SECRET: ${PUSH_NOTIFY_SECRET:-}

  web:
    build:
      context: ./web
      target: dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    working_dir: /app
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ../.knowns:/knowns:ro
      - ./.knowns-outbox:/knowns-outbox
    ports:
      - "${WEB_PORT:-3127}:3000"
    environment:
      KNOWNS_CANONICAL_ROOT: /knowns
      KNOWNS_OUTBOX: /knowns-outbox
      SHARED_PB_URL: ${SHARED_PB_URL:-http://host.docker.internal:8090}
      NEXT_PUBLIC_SHARED_PB_URL: ${NEXT_PUBLIC_SHARED_PB_URL:-http://127.0.0.1:8090}
      SAILY_PB_URL: ${SAILY_PB_URL:-http://host.docker.internal:8092}
      NEXT_PUBLIC_SAILY_PB_URL: ${NEXT_PUBLIC_SAILY_PB_URL:-http://127.0.0.1:8092}
      NEXT_PUBLIC_AUTH_GOOGLE_ENABLED: "false"
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
      POSTHOG_PROJECT_TOKEN: ${POSTHOG_PROJECT_TOKEN:-}
      POSTHOG_PROJECT_ID: ${POSTHOG_PROJECT_ID:-199773}
      POSTHOG_PERSONAL_API_KEY: ${POSTHOG_PERSONAL_API_KEY:-}
      POSTHOG_CAPTURE_HOST: ${POSTHOG_CAPTURE_HOST:-https://us.i.posthog.com}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.posthog.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_AUDIENCE_ID: ${RESEND_AUDIENCE_ID:-}
      SAILY_PB_SUPERUSER_EMAIL: ${SAILY_PB_SUPERUSER_EMAIL:-}
      SAILY_PB_SUPERUSER_PASSWORD: ${SAILY_PB_SUPERUSER_PASSWORD:-}
      ADMIN_SYNC_SECRET: ${ADMIN_SYNC_SECRET:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      PUSH_NOTIFY_SECRET: ${PUSH_NOTIFY_SECRET:-}
      WATCHPACK_POLLING: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  cypress:
    image: cypress/included:15.10.0
    working_dir: /e2e
    volumes:
      - ./web:/e2e
      - web_node_modules:/e2e/node_modules
      - ../.knowns:/knowns:ro
      - ./.knowns-outbox:/knowns-outbox
    environment:
      CYPRESS_baseUrl: http://web:3000
      KNOWNS_CANONICAL_ROOT: /knowns
      KNOWNS_OUTBOX: /knowns-outbox
      CYPRESS_E2E_TEST_EMAIL: ${E2E_TEST_EMAIL:-}
      CYPRESS_E2E_TEST_PASSWORD: ${E2E_TEST_PASSWORD:-}
      CYPRESS_E2E_TEST_RUN_TAG: ${E2E_TEST_RUN_TAG:-e2e-run}
    depends_on:
      web:
        condition: service_healthy
    profiles:
      - test

  tour-tester:
    image: cypress/included:15.10.0
    working_dir: /e2e
    volumes:
      - ./web:/e2e
      - web_node_modules:/e2e/node_modules
      - ./:/project
      - ../.knowns:/knowns:ro
      - ./.knowns-outbox:/knowns-outbox
    environment:
      CYPRESS_baseUrl: http://web:3000
      KNOWNS_CANONICAL_ROOT: /knowns
      KNOWNS_OUTBOX: /knowns-outbox
    depends_on:
      web:
        condition: service_healthy
    profiles:
      - tour

volumes:
  web_node_modules:
