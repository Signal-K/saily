services:
  web:
    build:
      context: ./web
      target: dev
    working_dir: /app
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_URL_INTERNAL: ${SUPABASE_URL_INTERNAL:-http://host.docker.internal:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH}
      NEXT_PUBLIC_AUTH_GOOGLE_ENABLED: ${NEXT_PUBLIC_AUTH_GOOGLE_ENABLED:-false}
      WATCHPACK_POLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  cypress:
    image: cypress/included:15.10.0
    working_dir: /e2e
    volumes:
      - ./web:/e2e
      - web_node_modules:/e2e/node_modules
    environment:
      CYPRESS_baseUrl: http://web:3000
      CYPRESS_E2E_TEST_EMAIL: ${E2E_TEST_EMAIL}
      CYPRESS_E2E_TEST_PASSWORD: ${E2E_TEST_PASSWORD}
      CYPRESS_E2E_TEST_RUN_TAG: ${E2E_TEST_RUN_TAG:-e2e-run}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      web:
        condition: service_healthy
    profiles:
      - test

volumes:
  web_node_modules:
